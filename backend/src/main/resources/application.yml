spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: futuratecno
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/futuratecno_db}
    username: ${SPRING_DATASOURCE_USERNAME:futuratecno}
    password: ${SPRING_DATASOURCE_PASSWORD:futuratecno}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    baselineOnMigrate: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

icecat:
  username: ${ICECAT_USERNAME:}
  api-token: ${ICECAT_API_TOKEN:}
  content-token: ${ICECAT_CONTENT_TOKEN:}
  lang: ${ICECAT_LANG:ES}

google:
  # Client ID de "Sign in with Google" (OAuth 2.0, tipo Web). No es secreto.
  # Vacío = login con Google desactivado (el frontend oculta el botón).
  client-id: ${GOOGLE_CLIENT_ID:}
  search:
    api-key: ${GOOGLE_API_KEY:}
    cx: ${GOOGLE_CX:}

elit:
  base-url: ${ELIT_BASE_URL:https://clientes.elit.com.ar/v1/api}
  user-id: ${ELIT_USER_ID:}
  token: ${ELIT_TOKEN:}

invid:
  base-url: ${INVID_BASE_URL:}
  username: ${INVID_USERNAME:}
  password: ${INVID_PASSWORD:}

sync:
  enabled: ${SYNC_ENABLED:true}
  cron: ${SYNC_CRON:0 30 6 * * *}   # 06:30 hora Argentina, todos los días

app:
  cutoff-hour: ${CUTOFF_HOUR:14}
  image-storage-path: /app/static/images
  # URL canónica: el apex (sin www) redirige 301 a este host. Vacío = sin redirección.
  canonical-host: ${CANONICAL_HOST:www.futuratecno.com.ar}
  mail:
    from: ${MAIL_FROM:}            # remitente (ej. no-responder@futuratecno.com.ar). Vacío = no se manda email.
    from-name: ${MAIL_FROM_NAME:FuturaTecno}

jwt:
  secret: ${JWT_SECRET:cambia-este-secreto-por-uno-largo-y-aleatorio-de-32-chars-minimo!!}
  expiration-ms: ${JWT_EXPIRATION_MS:604800000}

admin:
  email: ${ADMIN_EMAIL:admin@futuratecno.com}
  password: ${ADMIN_PASSWORD:admin1234}
