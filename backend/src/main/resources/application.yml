spring:
  application:
    name: futuratecno
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/futuratecno_db}
    username: ${SPRING_DATASOURCE_USERNAME:futuratecno}
    password: ${SPRING_DATASOURCE_PASSWORD:futuratecno}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    baselineOnMigrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

app:
  cutoff-hour: ${CUTOFF_HOUR:14}
  image-storage-path: /app/static/images
